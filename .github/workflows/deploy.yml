name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_seed:
        description: "Skip database seeding"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Cancel in-progress deployments for the same branch
concurrency:
  group: deploy-production
  cancel-in-progress: false  # Let current deploy finish to avoid inconsistent state

env:
  NODE_VERSION: "20"
  BUN_VERSION: "latest"

jobs:
  # ──────────────────────────────────────────────────────
  # Job 1: Build & Test
  # ──────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .next/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile 2>/dev/null || bun install

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Lint
        run: bun run lint 2>/dev/null || npx eslint . 2>/dev/null || true
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit 2>/dev/null || true
        continue-on-error: true

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: "file:./dev.db"
          TURSO_AUTH_TOKEN: ""
          NEXTAUTH_SECRET: "ci-build-placeholder"
          NEXTAUTH_URL: "http://localhost:3000"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 1

  # ──────────────────────────────────────────────────────
  # Job 2: Database Migration
  # ──────────────────────────────────────────────────────
  migrate:
    name: Push Database Schema
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile 2>/dev/null || bun install

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Push schema to Turso
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Verify database connection
        run: |
          echo "Testing database connection..."
          npx prisma db pull --print 2>/dev/null || echo "Schema push completed (verify in Turso dashboard)"

  # ──────────────────────────────────────────────────────
  # Job 3: Deploy to Vercel
  # ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build, migrate]
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee /dev/stderr | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | head -1)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ──────────────────────────────────────────────────────
  # Job 4: Seed Production Database
  # ──────────────────────────────────────────────────────
  seed:
    name: Seed Production Database
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 10
    if: github.event.inputs.skip_seed != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile 2>/dev/null || bun install

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed achievements
        run: |
          echo "Seeding achievements and admin user to production database..."
          bun run scripts/seed-production.ts 2>/dev/null || node scripts/seed-production.mjs 2>/dev/null || {
            echo "Falling back to API-based seeding..."
            DEPLOY_URL="${{ needs.deploy.outputs.url }}"
            if [[ -n "$DEPLOY_URL" ]]; then
              SEED_RESPONSE=$(curl -s -X POST "$DEPLOY_URL/api/seed" -H "Authorization: Bearer ${{ secrets.SEED_SECRET }}" 2>/dev/null || echo "failed")
              echo "Seed response: $SEED_RESPONSE"
            else
              echo "No deploy URL available for API seeding"
            fi
          }
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

  # ──────────────────────────────────────────────────────
  # Job 5: Post-deployment Verification
  # ──────────────────────────────────────────────────────
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 5

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 15

      - name: Health check
        run: |
          DEPLOY_URL="${{ needs.deploy.outputs.url }}"
          if [[ -z "$DEPLOY_URL" ]]; then
            echo "No deploy URL available, skipping health check"
            exit 0
          fi

          echo "Checking health endpoint: $DEPLOY_URL/api/health"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/health" 2>/dev/null || echo "000")

          if [[ "$HTTP_STATUS" == "200" ]]; then
            echo "✅ Health check passed (HTTP 200)"
          elif [[ "$HTTP_STATUS" == "000" ]]; then
            echo "⚠️ Could not reach deployment (may need more time to start)"
            echo "Manual check: curl $DEPLOY_URL/api/health"
          else
            echo "⚠️ Health check returned HTTP $HTTP_STATUS"
            echo "Manual check: curl $DEPLOY_URL/api/health"
          fi

      - name: Homepage check
        run: |
          DEPLOY_URL="${{ needs.deploy.outputs.url }}"
          if [[ -z "$DEPLOY_URL" ]]; then
            echo "No deploy URL available, skipping homepage check"
            exit 0
          fi

          echo "Checking homepage: $DEPLOY_URL"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$DEPLOY_URL" 2>/dev/null || echo "000")

          if [[ "$HTTP_STATUS" == "200" ]]; then
            echo "✅ Homepage accessible (HTTP 200)"
          else
            echo "⚠️ Homepage returned HTTP $HTTP_STATUS"
          fi

      - name: Summary
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo "  Deployment Summary"
          echo "═══════════════════════════════════════════════════════"
          echo "  Branch:       ${{ github.ref_name }}"
          echo "  Commit:       ${{ github.sha }}"
          echo "  Deploy URL:   ${{ needs.deploy.outputs.url }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  Workflow:     ${{ github.event_name }}"
          echo "═══════════════════════════════════════════════════════"
